/* ИСПРАВЛЕННАЯ ЛОГИКА ПРОВЕРКИ (немного усилена) */
async function checkLink(url) {
  try {
    const timeout = parseInt(document.getElementById('timeoutSel').value) || 5000;
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), timeout);

    const response = await fetch(url, {
      signal: controller.signal,
      method: 'GET',
      headers: {
        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
        'Accept': 'video/*,application/vnd.apple.mpegurl,*/*',
        'Range': 'bytes=0-1023'
      },
      cache: 'no-store'
    });

    clearTimeout(timeoutId);

    // Улучшение: явно принимаем 200 и 206
    if (!response.ok && response.status !== 206) return false;

    const contentType = (response.headers.get('Content-Type') || '').toLowerCase();
    return contentType.includes('video') ||
           contentType.includes('mpegurl') ||
           contentType.includes('octet-stream') ||
           response.status === 206; // многие стримы отдают 206
  } catch (e) {
    return false;
  }
}
